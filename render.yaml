services:
  - type: pserv
    runtime: image
    name: navshop-react-node-mysql
    plan: starter
    region: singapore
    image:
      url: docker.io/library/mysql:8.4
    envVars:
      - key: MYSQL_DATABASE
        value: navshop_react
      - key: MYSQL_USER
        value: navshop
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: web
    runtime: node
    name: navshop-react-node-web
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromService:
          type: pserv
          name: navshop-react-node-mysql
          property: host
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: navshop_react
      - key: DB_USER
        value: navshop
      - key: DB_PASS
        fromService:
          type: pserv
          name: navshop-react-node-mysql
          envVarKey: MYSQL_PASSWORD
      - key: DB_SKIP_CREATE
        value: true
      - key: DB_CONNECT_RETRIES
        value: 60
      - key: DB_CONNECT_RETRY_MS
        value: 5000
